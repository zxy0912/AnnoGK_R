name: AnnoGK_env
channels:
  - conda-forge
  - nodefaults
dependencies:
  - gcc_linux-64=11.4.0
  - gxx_linux-64=11.4.0
  - c-compiler
  - cxx-compiler
  - sysroot_linux-64
  - binutils_linux-64
  - make
  - cmake

  - libblas=*=*openblas
  - libcblas=*=*openblas
  - liblapack=*=*openblas

  - r-base>=4.3.0
  - r-devtools
  - r-remotes

  - r-matrix=1.6_5
  - r-rcpp=1.1.0
  - r-rcppeigen=0.3.4.0.2
